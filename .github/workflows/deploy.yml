name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Inject Fernet Key
        env:
          FERNET_KEY: ${{ secrets.FERNET_KEY }}
        run: python3 -c "import pathlib,os; p=pathlib.Path('index.html'); p.write_text(p.read_text(encoding='utf-8').replace('__FERNET_KEY__', os.environ['FERNET_KEY']), encoding='utf-8'); print('Injected OK')"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,vault.py,vault.py.bak,vault.enc,vault_export.txt,*.md'
