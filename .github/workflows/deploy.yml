name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Inject Fernet Key
        env:
          FERNET_KEY: ${{ secrets.FERNET_KEY }}
        run: |
          python3 - <<'EOF'
          import pathlib, os
          html = pathlib.Path('index.html').read_text(encoding='utf-8')
          html = html.replace('__FERNET_KEY__', os.environ['FERNET_KEY'])
          pathlib.Path('index.html').write_text(html, encoding='utf-8')
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,vault.py,vault.py.bak,vault.enc,vault_export.txt,*.md'
