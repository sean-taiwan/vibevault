// ── Base64url helpers ───────────────────────────────────────────────────────
function base64urlDecode(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4) str += '=';
  const bin = atob(str);
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}

function base64urlEncode(bytes) {
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// ── Fernet Encrypt ──────────────────────────────────────────────────────────
// Returns base64url Fernet token string
async function fernetEncrypt(keyB64url, plaintext) {
  const keyBytes = base64urlDecode(keyB64url);
  if (keyBytes.length !== 32) throw new Error('Key must be 32 bytes');

  const signingKey  = keyBytes.slice(0, 16);
  const encryptKey  = keyBytes.slice(16, 32);

  // AES-128-CBC requires 16-byte key — import
  const aesKey = await crypto.subtle.importKey(
    'raw', encryptKey, { name: 'AES-CBC' }, false, ['encrypt']
  );

  // Random IV
  const iv = crypto.getRandomValues(new Uint8Array(16));

  // Timestamp — seconds since epoch, big-endian 8 bytes
  const now = Math.floor(Date.now() / 1000);
  const tsBuf = new Uint8Array(8);
  const tsView = new DataView(tsBuf.buffer);
  tsView.setUint32(0, Math.floor(now / 0x100000000), false);
  tsView.setUint32(4, now >>> 0, false);

  // Encrypt
  const ptBytes = new TextEncoder().encode(plaintext);
  const ctBuf   = await crypto.subtle.encrypt({ name: 'AES-CBC', iv }, aesKey, ptBytes);
  const ct      = new Uint8Array(ctBuf);

  // Build payload for HMAC: version(1) + ts(8) + iv(16) + ct
  const payload = new Uint8Array(1 + 8 + 16 + ct.length);
  payload[0] = 0x80;
  payload.set(tsBuf, 1);
  payload.set(iv, 9);
  payload.set(ct, 25);

  // HMAC-SHA256
  const hmacKey = await crypto.subtle.importKey(
    'raw', signingKey,
    { name: 'HMAC', hash: 'SHA-256' },
    false, ['sign']
  );
  const sigBuf = await crypto.subtle.sign('HMAC', hmacKey, payload);
  const sig    = new Uint8Array(sigBuf);

  // Final token = payload + HMAC(32B)
  const token = new Uint8Array(payload.length + 32);
  token.set(payload);
  token.set(sig, payload.length);

  return base64urlEncode(token);
}

// ── Fernet Decrypt ──────────────────────────────────────────────────────────
async function fernetDecrypt(keyB64url, tokenStr) {
  const keyBytes = base64urlDecode(keyB64url);
  if (keyBytes.length !== 32) throw new Error('Key must be 32 bytes');

  const signingKey = keyBytes.slice(0, 16);
  const encryptKey = keyBytes.slice(16, 32);

  const token = base64urlDecode(tokenStr);
  if (token.length < 57) throw new Error('Token too short');
  if (token[0] !== 0x80) throw new Error('Invalid Fernet version');

  const payload = token.slice(0, token.length - 32);
  const sigGiven = token.slice(token.length - 32);

  // Verify HMAC
  const hmacKey = await crypto.subtle.importKey(
    'raw', signingKey,
    { name: 'HMAC', hash: 'SHA-256' },
    false, ['verify']
  );
  const valid = await crypto.subtle.verify('HMAC', hmacKey, sigGiven, payload);
  if (!valid) throw new Error('HMAC verification failed — wrong key?');

  const iv = payload.slice(9, 25);
  const ct = payload.slice(25);

  const aesKey = await crypto.subtle.importKey(
    'raw', encryptKey, { name: 'AES-CBC' }, false, ['decrypt']
  );
  const ptBuf = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, aesKey, ct);
  return new TextDecoder().decode(ptBuf);
}
